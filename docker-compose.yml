services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - apps/server/.env
    restart: unless-stopped
    expose:
      - "3000"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        VITE_BASE_URL: https://game.s4md.com/api
        VITE_SOCKET_URL: https://game.s4md.com
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
